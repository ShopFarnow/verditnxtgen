name: Nightly Company Database Refresh

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:

  refresh-database:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Crawl MCA21 + WHOIS + News
        env:
          NEWS_API_KEY:     ${{ secrets.NEWS_API_KEY }}
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_HOST:    ${{ secrets.PINECONE_HOST }}
        run: node scripts/crawl.js

      - name: Calculate trust scores
        run: node scripts/score.js

      - name: Sync embeddings to Pinecone
        env:
          OPENAI_API_KEY:   ${{ secrets.OPENAI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_HOST:    ${{ secrets.PINECONE_HOST }}
        run: node scripts/sync-embeddings.js

      - name: Generate SEO HTML pages
        run: node scripts/generate-pages.js

      - name: Commit updated data and pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: nightly refresh ${{ github.run_number }}"
          file_pattern: |
            data/companies.json
            data/raw/*.json
            company/*.html
            sitemap.xml
            robots.txt
