name: Nightly Company Database Refresh

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:      # Allows manual trigger

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 🔥 CRITICAL FIX: Ensure JSON files are never empty
      - name: Validate and prepare JSON files
        run: |
          # Check companies.json – if empty or missing, write []
          if [ ! -s data/companies.json ]; then
            echo "[]" > data/companies.json
            echo "⚠️ companies.json was empty or missing – initialized with []"
          fi

          # Check queue.json – if empty or missing, write []
          if [ ! -s data/queue.json ]; then
            echo "[]" > data/queue.json
            echo "⚠️ queue.json was empty or missing – initialized with []"
          fi

          # Optional: validate JSON syntax
          for file in data/companies.json data/queue.json; do
            if ! jq empty "$file" 2>/dev/null; then
              echo "❌ Invalid JSON in $file – resetting to []"
              echo "[]" > "$file"
            fi
          done

      - name: Install dependencies (if any)
        run: npm ci || true  # Skip if no package.json

      # Run scoring script – now safe even if files were empty
      - name: Run score.js
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: node scripts/score.js

      # Run crawl script (processes new queue entries)
      - name: Run crawl.js
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: node scripts/crawl.js

      # Commit and push any changes back to the repo
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update company data [skip ci]"
          git push
