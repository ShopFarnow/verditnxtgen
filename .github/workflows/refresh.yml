name: Nightly Company Database Refresh

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 🔥 Give the default GITHUB_TOKEN write access to the repository
permissions:
  contents: write

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jq (JSON processor)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Validate and repair JSON files
        run: |
          reset_json() {
            echo "[]" > "$1"
            echo "⚠️ Reset $1 to []"
          }
          for file in data/companies.json data/queue.json; do
            if [ ! -f "$file" ]; then
              reset_json "$file"
            elif ! jq empty "$file" 2>/dev/null; then
              echo "❌ Invalid JSON in $file – resetting"
              reset_json "$file"
            elif [ ! -s "$file" ]; then
              echo "⚠️ $file is empty – resetting"
              reset_json "$file"
            fi
          done

      - name: Run score.js
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: node scripts/score.js

      - name: Run crawl.js
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: node scripts/crawl.js

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update company data [skip ci]"
          git push
