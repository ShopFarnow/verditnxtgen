name: Nightly Company Database Refresh

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 🔥 Fix 1: Ensure JSON files are non‑empty and valid
      - name: Validate and repair JSON files
        run: |
          # Install jq for JSON validation (optional but recommended)
          sudo apt-get update && sudo apt-get install -y jq

          # Function to reset a JSON file to []
          reset_json() {
            echo "[]" > "$1"
            echo "⚠️ Reset $1 to []"
          }

          # Process companies.json
          if [ ! -f data/companies.json ]; then
            reset_json data/companies.json
          else
            if ! jq empty data/companies.json 2>/dev/null; then
              echo "❌ Invalid JSON in companies.json – resetting"
              reset_json data/companies.json
            elif [ ! -s data/companies.json ]; then
              echo "⚠️ companies.json is empty – resetting"
              reset_json data/companies.json
            fi
          fi

          # Process queue.json
          if [ ! -f data/queue.json ]; then
            reset_json data/queue.json
          else
            if ! jq empty data/queue.json 2>/dev/null; then
              echo "❌ Invalid JSON in queue.json – resetting"
              reset_json data/queue.json
            elif [ ! -s data/queue.json ]; then
              echo "⚠️ queue.json is empty – resetting"
              reset_json data/queue.json
            fi
          fi

      # 🔥 Fix 2: Skip npm ci if no package.json – just run scripts directly
      - name: Run score.js
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: node scripts/score.js

      - name: Run crawl.js
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: node scripts/crawl.js

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update company data [skip ci]"
          git push
